<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LinkedIn Job Tracker</title>
  <style>
    /* shadcn/ui zinc palette */
    :root {
      --bg:           #ffffff;
      --fg:           #09090b;
      --muted:        #f4f4f5;
      --muted-fg:     #71717a;
      --border:       #e4e4e7;
      --input:        #e4e4e7;
      --primary:      #18181b;
      --primary-fg:   #fafafa;
      --destructive:  #ef4444;
      --radius:       0.45rem;
      --ring:         #18181b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .header-sub {
      font-size: 12px;
      color: var(--muted-fg);
      margin-top: 1px;
    }

    /* ── Tabs ───────────────────────────────────────────── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 4px;
    }
    .tab-btn {
      padding: 9px 12px 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted-fg);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active  { color: var(--fg); border-bottom-color: var(--fg); }
    .tab-btn:hover:not(.active) { color: var(--fg); }

    .tab-panel        { display: none; }
    .tab-panel.active { display: block; }

    /* ── Buttons ────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--primary-fg);
      border-color: var(--primary);
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.45; cursor: default; }

    .btn-ghost {
      background: transparent;
      color: var(--destructive);
      border-color: var(--border);
    }
    .btn-ghost:hover:not(:disabled) {
      background: var(--destructive);
      color: #fff;
      border-color: var(--destructive);
    }
    .btn-ghost:disabled { opacity: 0.45; cursor: default; }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
    }

    /* ── Action bar ─────────────────────────────────────── */
    .action-bar {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }

    /* ── Job list ───────────────────────────────────────── */
    .job-list {
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid var(--border);
    }
    .job-list::-webkit-scrollbar { width: 4px; }
    .job-list::-webkit-scrollbar-track { background: transparent; }
    .job-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .job-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .job-item:last-child { border-bottom: none; }

    .job-info { flex: 1; min-width: 0; }
    .job-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .job-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 3px;
    }
    .job-company { font-size: 12px; color: var(--muted-fg); }
    .job-sep     { width: 3px; height: 3px; border-radius: 50%; background: var(--muted-fg); opacity: 0.4; flex-shrink: 0; }
    .job-date    { font-size: 11px; color: var(--muted-fg); opacity: 0.7; }

    .job-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 9999px;
      font-size: 10.5px;
      font-weight: 500;
      background: var(--muted);
      color: var(--muted-fg);
      white-space: nowrap;
    }

    .job-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted-fg);
      opacity: 0.45;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 13px;
      flex-shrink: 0;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
      line-height: 1;
    }
    .job-remove:hover { opacity: 1; color: var(--destructive); background: #fef2f2; }

    /* ── Empty state ────────────────────────────────────── */
    .empty {
      padding: 44px 20px;
      text-align: center;
      color: var(--muted-fg);
    }
    .empty-icon  { font-size: 30px; margin-bottom: 12px; }
    .empty-title { font-size: 14px; font-weight: 500; color: var(--fg); margin-bottom: 6px; }
    .empty-desc  { font-size: 12px; line-height: 1.65; }

    /* ── Settings ───────────────────────────────────────── */
    .settings {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }

    .field-label {
      font-size: 13px;
      font-weight: 500;
    }
    .field-hint {
      font-size: 11.5px;
      color: var(--muted-fg);
      line-height: 1.55;
    }
    .field-hint code {
      font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
      background: var(--muted);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }

    .field-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--input);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
      color: var(--fg);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field-input:focus {
      border-color: var(--ring);
      box-shadow: 0 0 0 2px rgba(24,24,27,0.07);
    }

    .settings-footer {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .save-ok {
      font-size: 12px;
      color: #16a34a;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .save-ok.show { opacity: 1; }

    /* pager */
    .pager {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 8px 16px;
      border-top: 1px solid var(--border);
    }
    .pager-btn {
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--fg);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .pager-btn:hover:not(:disabled) { background: var(--muted); }
    .pager-btn:disabled { opacity: 0.35; cursor: default; }
    .pager-info { font-size: 12px; color: var(--muted-fg); }

  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div>
      <h1>LinkedIn Job Tracker</h1>
      <div class="header-sub" id="subtitle">Loading…</div>
    </div>
  </div>

  <!-- Tabs -->
  <nav class="tabs">
    <button class="tab-btn active" data-tab="jobs">Jobs</button>
    <button class="tab-btn"        data-tab="settings">Settings</button>
  </nav>

  <!-- ── Jobs tab ── -->
  <div class="tab-panel active" id="tab-jobs">
    <div class="action-bar">
      <button class="btn btn-primary" id="exportBtn" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export jobs.xlsx
      </button>
      <button class="btn btn-ghost" id="clearBtn">Clear all</button>
    </div>
    <div class="job-list" id="jobList"></div>
  </div>

  <!-- ── Settings tab ── -->
  <div class="tab-panel" id="tab-settings">
    <div class="settings">

      <div class="field">
        <label class="field-label" for="filename">Filename</label>
        <p class="field-hint">Name of the exported file.</p>
        <input class="field-input" id="filename" type="text"
               placeholder="jobs.xlsx" spellcheck="false" autocomplete="off" />
      </div>

      <div class="settings-footer">
        <button class="btn btn-primary btn-sm" id="saveSettingsBtn">Save settings</button>
        <span class="save-ok" id="saveOk">✓ Saved</span>
      </div>

    </div>
  </div>

  <script src="xlsx.mini.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
